name: CI — Run Tests

# Trigger on every push to main and on every pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest (unit tests)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Cache pip dependencies so subsequent runs are faster
      #    The cache key includes the OS and a hash of requirements.txt —
      #    if requirements.txt changes, the cache is invalidated.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      #    We install only the packages needed for unit tests — skipping
      #    heavy ML packages (bertopic, torch) that aren't needed for
      #    the unit tests that run in CI.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas numpy scipy scikit-learn \
            pydantic nltk pytest pytest-cov

      # 5. Download NLTK stopwords (needed by transform.preprocess_text)
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True)"

      # 6. Run unit tests only (integration tests are skipped — they require
      #    data files that are not committed to the repo)
      #    --cov generates a coverage report shown in the CI logs
      - name: Run unit tests
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            -v

      # 7. Upload coverage report as a CI artifact (viewable in GitHub Actions UI)
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
